<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BUYITONLINE.in</title>
  <link rel="icon" type="image/png" href="tab.jpg" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif}
    html{scroll-behavior:smooth}
    body{background:#f5f5f5;padding-top:120px;color:#222}

    /* Header */
    header{position:fixed;top:0;left:0;width:100%;background:#fff;border-bottom:1px solid #e5e5e5;z-index:9999}
    .navbar{max-width:1400px;height:120px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:0 30px}
    .logo{margin-left:-48px}
    .logo img{height:200px;display:block}
    .social-buttons{display:flex;gap:15px}
    .social-btn{display:flex;align-items:center;gap:10px;padding:12px 22px;border-radius:50px;text-decoration:none;color:#fff;font-weight:bold;transition:.25s}
    .social-btn i{font-size:24px;width:24px;text-align:center}
    .instagram{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
    .whatsapp{background:#25D366}
    .social-btn:hover{transform:translateY(-2px)}

    /* Hero */
    .hero{height:500px;background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),url("welcome image.png");background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;padding:40px}
    .hero .hero-inner{max-width:1100px}
    .hero h1{font-size:54px;margin-bottom:10px;color:#fff}
    .hero p{font-size:22px;color:#fff}

    /* Wave divider */
    .wave{line-height:0;margin-top:-2px}
    .wave svg{display:block;width:100%;height:120px}

    /* Instagram Section */
    .instagram-section{background:#fff;padding:60px 30px}
    .instagram-inner{max-width:1200px;margin:0 auto}
    .instagram-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr); /* 4 posts per row */
      gap:20px;
    }
    .insta-card{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      background:#fafafa;
      border-radius:8px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      overflow:hidden;
    }
    .image-wrapper{
      width:100%;
      aspect-ratio:1/1; /* square image */
      overflow:hidden;
    }
    .image-wrapper img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .buy-btn{
      display:inline-block;
      margin:12px 0;
      padding:10px 20px;
      background:#0c247a;
      color:#fff;
      font-weight:bold;
      text-decoration:none;
      border-radius:5px;
      transition:.3s;
    }
    .buy-btn:hover{
      background:#1a3db3;
    }
    .section-title{font-size:32px;margin-bottom:24px;color:#0c247a;text-align:center}

    /* Responsive */
    @media(max-width:1100px){
      .logo img{height:150px}
      .hero h1{font-size:44px}
    }

    @media(max-width:1024px){
      .instagram-grid{grid-template-columns:repeat(2,1fr);}
    }

    @media(max-width:768px){
      body{padding-top:220px}
      .navbar{flex-direction:column;height:auto;padding:20px;gap:15px}
      .logo{margin-left:0}
      .logo img{height:120px}
      .hero{height:auto;padding:60px 20px}
      .hero h1{font-size:32px}
      .hero p{font-size:16px}
      .instagram-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

      <a href="https://instagram.com/buyitonline_in" class="social-btn instagram">

      <a href="https://whatsapp.com/channel/0029VbANod3AInPsEi3VnE2x" class="social-btn whatsapp">
